name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Rust & Python CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build Python bindings
        run: |
          cd openai-oxide-python
          uv sync
          uv run maturin build

  node-bindings:
    name: Node bindings CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: openai-oxide-node
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: openai-oxide-node/pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Build native addon
        run: pnpm build

      - name: Smoke test addon
        run: pnpm test

      - name: Validate publish tarball
        run: pnpm pack:preview
