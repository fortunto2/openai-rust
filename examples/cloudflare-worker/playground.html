<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>openai-oxide playground</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0a;
    color: #e5e5e5;
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 16px 20px;
    border-bottom: 1px solid #222;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  header h1 {
    font-size: 16px;
    font-weight: 600;
    color: #f97316;
  }

  header h1 span { color: #666; font-weight: 400; }

  .controls {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  select, input[type="password"] {
    background: #1a1a1a;
    border: 1px solid #333;
    color: #e5e5e5;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 13px;
  }

  input[type="password"] { width: 200px; }
  input[type="password"]::placeholder { color: #555; }

  label.toggle {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    color: #888;
    cursor: pointer;
  }

  label.toggle input { accent-color: #f97316; }

  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .msg {
    max-width: 720px;
    padding: 12px 16px;
    border-radius: 12px;
    line-height: 1.5;
    font-size: 14px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg.user {
    background: #1e3a5f;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }

  .msg.assistant {
    background: #1a1a1a;
    border: 1px solid #222;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }

  .msg .meta {
    font-size: 11px;
    color: #555;
    margin-top: 6px;
  }

  .msg.error {
    background: #3a1a1a;
    border: 1px solid #5a2a2a;
    color: #f87171;
    align-self: center;
  }

  .cursor {
    display: inline-block;
    width: 2px;
    height: 14px;
    background: #f97316;
    margin-left: 1px;
    vertical-align: text-bottom;
    animation: blink 0.8s infinite;
  }

  @keyframes blink { 50% { opacity: 0; } }

  .input-area {
    padding: 16px 20px;
    border-top: 1px solid #222;
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }

  textarea {
    flex: 1;
    background: #1a1a1a;
    border: 1px solid #333;
    color: #e5e5e5;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    height: 44px;
    max-height: 120px;
    line-height: 1.4;
  }

  textarea:focus { outline: none; border-color: #f97316; }

  button.send {
    background: #f97316;
    color: #000;
    border: none;
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    flex-shrink: 0;
  }

  button.send:hover { background: #fb923c; }
  button.send:disabled { background: #444; color: #666; cursor: not-allowed; }

  footer {
    padding: 8px 20px;
    text-align: center;
    font-size: 11px;
    color: #444;
    border-top: 1px solid #181818;
    flex-shrink: 0;
  }

  footer a { color: #666; text-decoration: none; }
  footer a:hover { color: #f97316; }
</style>
</head>
<body>

<header>
  <h1>openai-oxide <span>playground</span></h1>
  <div class="controls">
    <select id="model">
      <option value="gpt-4.1-nano">gpt-4.1-nano</option>
      <option value="gpt-4.1-mini">gpt-4.1-mini</option>
      <option value="gpt-4.1">gpt-4.1</option>
      <option value="gpt-4o-mini">gpt-4o-mini</option>
      <option value="gpt-4o">gpt-4o</option>
      <option value="gpt-5-mini">gpt-5-mini</option>
      <option value="gpt-5">gpt-5</option>
      <option value="gpt-5.4-mini" selected>gpt-5.4-mini</option>
      <option value="gpt-5.4">gpt-5.4</option>
    </select>
    <label class="toggle">
      <input type="checkbox" id="stream" checked> Stream
    </label>
    <input type="password" id="apikey" placeholder="sk-... (optional, BYOK)">
  </div>
</header>

<div class="chat" id="chat"></div>

<div class="input-area">
  <textarea id="input" placeholder="Send a message..." rows="1"></textarea>
  <button class="send" id="send">Send</button>
</div>

<footer>
  Powered by <a href="https://crates.io/crates/openai-oxide" target="_blank">openai-oxide</a>
  &middot; Rust &rarr; WASM &middot; Cloudflare Workers edge
  &middot; <a href="https://github.com/fortunto2/openai-oxide" target="_blank">GitHub</a>
</footer>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const modelSel = document.getElementById('model');
const apiKeyInput = document.getElementById('apikey');
const streamToggle = document.getElementById('stream');

// Persist API key in localStorage
const savedKey = localStorage.getItem('openai_key');
if (savedKey) apiKeyInput.value = savedKey;
apiKeyInput.addEventListener('change', () => {
  const k = apiKeyInput.value.trim();
  if (k) localStorage.setItem('openai_key', k);
  else localStorage.removeItem('openai_key');
  apiKeyInput.style.borderColor = '#333';
  apiKeyInput.placeholder = 'sk-... (optional, BYOK)';
});

input.addEventListener('input', () => {
  input.style.height = '44px';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

sendBtn.addEventListener('click', send);

function addMsg(role, text, meta) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const textNode = document.createTextNode(text);
  div.appendChild(textNode);
  if (meta) {
    const m = document.createElement('div');
    m.className = 'meta';
    m.textContent = meta;
    div.appendChild(m);
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function getHeaders() {
  const h = { 'Content-Type': 'application/json' };
  const key = apiKeyInput.value.trim();
  if (key) h['X-OpenAI-Key'] = key;
  return h;
}

async function sendStream(text) {
  const t0 = performance.now();
  const res = await fetch('/chat/stream', {
    method: 'POST',
    headers: getHeaders(),
    body: JSON.stringify({ message: text, model: modelSel.value }),
  });

  if (!res.ok) {
    addMsg('error', `Error ${res.status}: ${await res.text()}`);
    return;
  }

  const msgDiv = addMsg('assistant', '');
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  msgDiv.insertBefore(cursor, msgDiv.firstChild.nextSibling);

  let fullText = '';
  let model = '';

  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;

    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop() || '';

    let eventType = '';
    for (const line of lines) {
      if (line.startsWith('event: ')) {
        eventType = line.slice(7);
      } else if (line.startsWith('data: ') && eventType) {
        try {
          const data = JSON.parse(line.slice(6));
          if (eventType === 'response.output_text.delta' && data.delta) {
            fullText += data.delta;
            msgDiv.firstChild.textContent = fullText;
            chat.scrollTop = chat.scrollHeight;
          } else if (eventType === 'response.completed' && data.response) {
            model = data.response.model || '';
          }
        } catch {}
        eventType = '';
      } else if (line === '') {
        eventType = '';
      }
    }
  }

  cursor.remove();
  const ms = Math.round(performance.now() - t0);
  const meta = document.createElement('div');
  meta.className = 'meta';
  meta.textContent = `${model || modelSel.value} · ${ms}ms · streamed`;
  msgDiv.appendChild(meta);
}

async function sendPlain(text) {
  const t0 = performance.now();
  const res = await fetch('/chat', {
    method: 'POST',
    headers: getHeaders(),
    body: JSON.stringify({ message: text, model: modelSel.value }),
  });

  if (!res.ok) {
    addMsg('error', `Error ${res.status}: ${await res.text()}`);
    return;
  }

  const data = await res.json();
  const ms = Math.round(performance.now() - t0);
  const tokens = data.usage?.input_tokens != null
    ? `${data.usage.input_tokens}+${data.usage.output_tokens} tokens`
    : '';
  addMsg('assistant', data.text, `${data.model} · ${ms}ms${tokens ? ' · ' + tokens : ''}`);
}

async function send() {
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = '44px';
  sendBtn.disabled = true;

  addMsg('user', text);

  if (!apiKeyInput.value.trim()) {
    apiKeyInput.style.borderColor = '#f97316';
    apiKeyInput.focus();
    apiKeyInput.placeholder = 'Enter your OpenAI key first!';
    addMsg('error', 'Please enter your OpenAI API key (sk-...)');
    sendBtn.disabled = false;
    return;
  }

  try {
    if (streamToggle.checked) {
      await sendStream(text);
    } else {
      await sendPlain(text);
    }
  } catch (e) {
    addMsg('error', e.message);
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
}

input.focus();
</script>
</body>
</html>
