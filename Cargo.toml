[package]
name = "openai-oxide"
version = "0.1.1"
edition = "2021"
description = "Idiomatic Rust client for the OpenAI API — 1:1 parity with the official Python SDK"
license = "MIT"
repository = "https://github.com/fortunto2/openai-rust"
readme = "README.md"
keywords = ["openai", "gpt", "ai", "llm", "chatgpt"]
categories = ["api-bindings", "web-programming::http-client"]

[dependencies]
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json", "stream", "multipart"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tracing = "0.1"
futures-core = "0.3"
futures-util = "0.3"
bytes = "1"
pin-project-lite = "0.2"

[dev-dependencies]
mockito = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }

[features]
live-tests = []
